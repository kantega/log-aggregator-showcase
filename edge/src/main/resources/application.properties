spring.application.name=edge
server.port=8081

# Disable Spring Boot Docker Compose integration (infra managed by root docker-compose.yml)
spring.docker.compose.enabled=false

# MongoDB
spring.data.mongodb.uri=mongodb://root:secret@localhost:27017/edge?authSource=admin

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=myuser
spring.rabbitmq.password=secret

# Adapters
adapters[0].name=adapter-a
adapters[0].url=http://localhost:8082
adapters[0].trigger=ON_ENTRY
adapters[1].name=adapter-b
adapters[1].url=http://localhost:8083
adapters[1].trigger=ON_GROUP_CLOSE
